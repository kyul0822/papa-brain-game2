<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>그림 기억 퀴즈</title>
<style>
body{font-family:sans-serif;text-align:center;background:#f4f4f4}
img{width:280px;height:280px;border-radius:10px;margin:20px}
button{display:block;margin:10px auto;padding:12px;font-size:22px;width:240px}
</style>
</head>
<body>

<h1>그림 기억 퀴즈</h1>

<div id="start">
<h2>주제를 선택하세요</h2>
<button onclick="start('nature')">자연</button>
<button onclick="start('food')">한국 음식</button>
<button onclick="start('animal')">동물</button>
<button onclick="start('item')">생활용품</button>
<button onclick="start('transport')">교통수단</button>
<button onclick="start('weather')">계절 / 날씨</button>
</div>

<div id="game" style="display:none">
<h2 id="question"></h2>
<img id="image">
<div id="choices"></div>
<p id="result"></p>
</div>

<script>

const data = {
nature:["산","강","나무","꽃","숲","바다","하늘","바위","들판","폭포"],
fish:["붕어","잉어","메기","송어","가물치","쏘가리","배스","블루길","피라미","장어"],
food:["김치","라면","만두","밥","비빔밥","불고기","된장국","떡","잡채","김밥"],
animal:["개","고양이","소","말","호랑이","사자","곰","토끼","사슴","코끼리"],
item:["컵","의자","시계","안경","우산","신발","가방","전화기","열쇠","책"],
transport:["자동차","버스","기차","자전거","비행기","배","지하철","오토바이","트럭","택시"],
weather:["눈","비","단풍","벚꽃","구름","바람","안개","무지개","서리","태풍"]
}

let topic
let questions=[]
let current=0
let score=0

function start(t){
topic=data[t]
document.getElementById("start").style.display="none"
document.getElementById("game").style.display="block"

for(let i=0;i<10;i++){
let r=topic[Math.floor(Math.random()*topic.length)]
questions.push(r)
}

show()
}

function show(){
let q=questions[current]

document.getElementById("question").innerText=
"문제 "+(current+1)+" 아래 그림은 무엇인가요?"

document.getElementById("image").src="images/"+getTopic()+"/"+q+".svg"

let options=[q]

while(options.length<5){
let r=topic[Math.floor(Math.random()*topic.length)]
if(!options.includes(r)) options.push(r)
}

options.sort(()=>Math.random()-0.5)

let html=""

options.forEach(o=>{
html+=`<button onclick="check('${o}')">${o}</button>`
})

document.getElementById("choices").innerHTML=html
}

function getTopic(){
for(let key in data){
if(data[key]===topic) return key
}
}

function check(answer){
let correct=questions[current]

if(answer==correct){
document.getElementById("result").innerText="정답입니다!"
score++
}else{
document.getElementById("result").innerText="오답입니다. 정답: "+correct
}

setTimeout(next,1500)
}

function next(){
current++
document.getElementById("result").innerText=""

if(current>=10){
document.getElementById("game").innerHTML=
"<h2>게임 종료</h2>"+
"<p>맞은 개수 : "+score+" / 10</p>"+
"<button onclick='location.reload()'>다시 하기</button>"
}else{
show()
}
}

</script>

</body>
</html>
